name: Deploy to Azure Static Web Apps

# wingscript.com marketing site → swa-wingscript-www (rg-wingscript-prod).
# Builds locally (CRA + react-snap prerender needs Chromium, which the Oryx
# build container lacks) and uploads with skip_app_build.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tailwind + CRA + react-snap prerender)
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: build
          skip_app_build: true
