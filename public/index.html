    <noscript>
      <div style="max-width:720px;margin:0 auto;padding:3rem 1.5rem;font-family:Inter,system-ui,sans-serif;line-height:1.6;color:#111;">
        <h1 style="font-size:1.75rem;">cuedesk — real-time call intelligence for sales teams</h1>
        <p>cuedesk is a Chrome extension and companion desktop app for sales reps. During a
        live call it listens to the conversation and surfaces real-time, AI-generated cues —
        relevant talking points, objection handling, and suggested next steps — so reps stay
        focused on the customer. After the call, cuedesk produces an automatic debrief and
        scorecard.</p>
        <h2 style="font-size:1.25rem;">How cuedesk uses your Google data</h2>
        <ul>
          <li><strong>Sign-in (email, name, profile picture):</strong> to create and authenticate your account.</li>
          <li><strong>Google Calendar (read-only):</strong> to detect upcoming meetings and prepare relevant context before a call. cuedesk never modifies your calendar.</li>
          <li><strong>Google Drive (drive.file):</strong> to export your call summaries to a Google Sheet cuedesk creates in your Drive. The scope is limited to files cuedesk creates — it cannot read your existing Drive contents.</li>
        </ul>
        <p>cuedesk's use of information received from Google APIs adheres to the
        <a href="https://developers.google.com/terms/api-services-user-data-policy">Google API Services User Data Policy</a>,
        including the Limited Use requirements. See our <a href="/privacy">Privacy Policy</a>.</p>
        <p><a href="https://chromewebstore.google.com/detail/cuedesk/hgekagfaoojilnelfgalkbocbeimfphb">Install the Chrome extension</a></p>
      </div>
    </noscript>
